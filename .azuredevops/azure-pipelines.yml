trigger:
  - main
  - dev

resources:
  repositories:
    - repository: owaspZap
      type: git
      name: Infraestrutura/owaspZap

variables:
  tag: $(Build.BuildId)
  vmImageName: ubuntu-latest
  dockerfilePath: $(Build.SourcesDirectory)/Dockerfile
  # URL do Backend definida como variável para facilitar a manutenção
  VITE_API_URL: 'https://rotasegura-back-qas.azurewebsites.net'

pool:
  vmImage: $(vmImageName)

stages:
  - stage: DevSecOps
    displayName: Analise de Segurança
    jobs:
      - job: SCANGITLEAKS
        displayName: Scaneamento de repositorio com GitLeaks
        variables:
          - name: projectName
            value: $[variables['System.TeamProject']]
          - group: Code_Analysis
        pool:
          vmImage: $(vmImageName)
        steps:
          - template: gitleaks.yml@owaspZap
            parameters:
              branchName: $(Build.SourceBranchName)
              repositoryName: $(Build.Repository.Name)
              azureSubscription: RGBRZPIPELINESDEVSECOPS-Projetos RH

  - stage: Build
    jobs:
      - job: Build
        displayName: Build
        condition: eq(variables['Build.SourceBranch'], 'refs/heads/dev')
        steps:
          # Passo 1: Criar o arquivo .env com a URL correta
          - script: |
              echo "VITE_API_URL=$(VITE_API_URL)" > .env
              echo "Arquivo .env criado com sucesso para o build."
            displayName: 'Gerar arquivo .env'

          # Passo 2: Rodar o template de build (que vai disparar o Docker)
          - template: templates/build.yml
            parameters:
              tag: $(tag)
              bicep: main.bicep
              bicepparams: params-qas.json
              resourceGroup: RGROTASEGURAMVPQAS
              imageRepository: front-img
              dockerRegistryServiceConnection: acrrotaseguraqas